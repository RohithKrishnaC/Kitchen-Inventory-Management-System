{% extends "base.html" %}
{% block title %}Login - KitchenSync{% endblock %}

{% block content %}
<div class="auth-container card">
    <h2>Welcome Back</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required autofocus placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    <p class="text-center mt-4" style="color: var(--text-muted); font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>
{% endblock %}
